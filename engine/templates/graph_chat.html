<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secondo Cervello - Graph & Chat</title>
    
    <!-- Force Graph libs (Useremo solo 3D-force-graph per sfruttare WebGL sia in 2D che in 3D) -->
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
    
    <!-- Markdown to HTML basic parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/lib/marked.umd.min.js"></script>

    <!-- Modern Web Fonts: Caricamento locale di ABC Repro -->
    <style>
        @font-face {
            font-family: 'ABC Repro';
            src: url('/fonts/ABCRepro-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'ABC Repro';
            src: url('/fonts/ABCRepro-Black.woff') format('woff');
            font-weight: 900;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #0b0d10;
            --panel-bg: rgba(20, 24, 33, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-purple: #9d4edd;
            --accent-cyan: #00f5d4;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --text-muted: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'ABC Repro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 500;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            
            /* Attivazione legature e glifi combinati di ABC Repro */
            font-variant-ligatures: common-ligatures discretionary-ligatures historical-ligatures contextual;
            font-feature-settings: "liga" on, "dlig" on, "calt" on, "clig" on;
        }

        /* Classe utility per cerchiature di parole singole o composte (collegate con _) */
        .circled-text {
            font-feature-settings: "ss03" 1, "ss04" 1, "calt" 1, "dlig" 1;
        }

        body, input, textarea, button, select, option {
            font-family: 'ABC Repro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 500;
        }

        h1, h2, h3, h4, h5, h6, strong, b, .chat-submit, .toggle-btn, #modal-title {
            font-family: 'ABC Repro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 900;
            letter-spacing: -0.015em;
        }

        /* Graph Panel */
        #graph-panel {
            flex: 1;
            height: 100vh;
            position: relative;
            border-right: 1px solid var(--panel-border);
            background: #000;
            overflow: hidden; /* Prevent canvas from overflowing */
        }

        #graph-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(20, 24, 33, 0.8);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .toggle-btn:hover {
            background: var(--accent-cyan);
            color: #000;
        }

        /* Chat Panel */
        #chat-panel {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(157, 78, 221, 0.1), transparent 400px),
                        var(--bg-color);
            z-index: 2; /* Ensures chat is above any rogue canvas */
        }

        .chat-messages {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 85%;
            padding: 20px 24px;
            border-radius: 16px;
            line-height: 1.65;
            font-size: 1.5rem; /* INGRANDITO: testo del chatbot più leggibile */
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-purple), #6c5ce7);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message.bot p, #modal-body p {
            margin-bottom: 16px;
            line-height: 1.7;
        }
        .message.bot p:last-child, #modal-body p:last-child {
            margin-bottom: 0;
        }
        .message.bot code, #modal-body code {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3px 6px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            color: var(--accent-cyan);
        }
        .message.bot pre, #modal-body pre {
            background: rgba(10, 12, 17, 0.9);
            border: 1px solid var(--panel-border);
            padding: 16px 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin-top: 12px;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.5;
        }
        .message.bot pre code, #modal-body pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        /* Custom Scrollbars for Pre blocks */
        .message.bot pre::-webkit-scrollbar, #modal-body pre::-webkit-scrollbar {
            height: 6px;
        }
        .message.bot pre::-webkit-scrollbar-track, #modal-body pre::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        .message.bot pre::-webkit-scrollbar-thumb, #modal-body pre::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        /* Bot & Modal Headings Microtypography */
        .message.bot h1, #modal-body h1 {
            font-size: 1.6em;
            margin-top: 24px;
            margin-bottom: 12px;
            color: var(--accent-cyan);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 6px;
            line-height: 1.3;
        }
        .message.bot h2, #modal-body h2 {
            font-size: 1.4em;
            margin-top: 20px;
            margin-bottom: 10px;
            color: var(--text-primary);
            line-height: 1.3;
        }
        .message.bot h3, #modal-body h3 {
            font-size: 1.2em;
            margin-top: 16px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            line-height: 1.3;
        }
        .message.bot > *:first-child, #modal-body > *:first-child {
            margin-top: 0 !important;
        }

        /* Liste puntate (Chatbot & Wiki Modal) */
        .message.bot ul, #modal-body ul {
            list-style-type: none;
            padding-left: 0;
            margin: 12px 0 16px 0;
        }

        .message.bot ul li, #modal-body ul li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 10px;
            line-height: 1.75;
            font-size: 1.05em;
        }

        .message.bot ul li::before, #modal-body ul li::before {
            content: "→";
            position: absolute;
            left: 4px;
            top: 0;
            color: var(--accent-cyan);
            font-weight: 900;
            font-size: 1.15em;
            transition: transform 0.2s ease;
        }

        .message.bot ul li:hover::before, #modal-body ul li:hover::before {
            transform: translateX(4px);
        }

        /* Liste numerate curate (Chatbot & Wiki Modal) */
        .message.bot ol, #modal-body ol {
            list-style-type: none;
            counter-reset: custom-counter;
            padding-left: 0;
            margin: 12px 0 16px 0;
        }

        .message.bot ol li, #modal-body ol li {
            counter-increment: custom-counter;
            position: relative;
            padding-left: 32px;
            margin-bottom: 10px;
            line-height: 1.75;
            font-size: 1.05em;
        }

        .message.bot ol li::before, #modal-body ol li::before {
            content: counter(custom-counter, decimal-leading-zero) ".";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--accent-cyan);
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95em;
            letter-spacing: -0.05em;
        }

        /* Fix per i tag <p> annidati all'interno delle liste */
        .message.bot li > p, #modal-body li > p {
            display: inline;
            margin: 0;
        }

        /* Sotto-liste nidificate */
        .message.bot ul ul, .message.bot ol ol, .message.bot ul ol, .message.bot ol ul,
        #modal-body ul ul, #modal-body ol ol, #modal-body ul ol, #modal-body ol ul {
            margin-left: 20px;
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .chat-input-container {
            padding: 24px 30px;
            border-top: 1px solid var(--panel-border);
            background: rgba(11, 13, 16, 0.95);
        }

        .chat-form {
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 1.4rem; /* INGRANDITO: input più leggibile */
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: var(--accent-purple);
        }

        .chat-submit {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chat-submit:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .chat-submit:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: white; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 white, .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; }
        }

        /* WikiLink styling inside chat bubbles */
        .wiki-link {
            color: var(--accent-cyan);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-cyan);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
        }
        .wiki-link:hover {
            color: #fff;
            border-bottom-style: solid;
            text-shadow: 0 0 8px rgba(0, 245, 212, 0.6);
        }

        /* Modal overlay styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 13, 16, 0.85); /* Dark background matching the theme */
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(20, 24, 33, 0.95);
            border: 1px solid var(--accent-cyan);
            border-radius: 12px;
            width: 80vw;
            max-width: 800px;
            height: 80vh;
            max-height: 600px;
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            color: var(--text-primary);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--accent-purple);
        }

        #modal-title {
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            color: var(--accent-cyan);
            font-weight: 900;
            font-size: 1.8rem;
        }

        #modal-body {
            flex: 1;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 1.15rem; /* Ingrandito per leggibilità */
            padding-right: 10px;
        }
        


        /* Scrollbar in modal body */
        #modal-body::-webkit-scrollbar {
            width: 6px;
        }
        #modal-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        #modal-body::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="graph-panel">
        <button class="toggle-btn" id="mode-toggle">Switch to 2D</button>
        <div id="graph-container"></div>
    </div>

    <div id="chat-panel">
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Ciao! Sono il tuo assistente. Il mio grafo delle conoscenze è caricato qui a fianco. Chiedimi qualcosa!
            </div>
        </div>
        <div class="chat-input-container">
            <form class="chat-form" id="chat-form">
                <input type="text" id="chat-input" class="chat-input" placeholder="Cerca nel tuo secondo cervello..." autocomplete="off" required>
                <button type="submit" id="chat-submit" class="chat-submit">Invia</button>
            </form>
        </div>
    </div>

    <!-- Modal overlay for Wiki Pages -->
    <div id="wiki-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" id="modal-close">&times;</span>
            <h2 id="modal-title">Caricamento...</h2>
            <div id="modal-body">Sto leggendo la pagina...</div>
        </div>
    </div>

    <script>
        let graphData = { nodes: [], links: [] };
        let is3D = true; // Impostiamo 3D come default
        let Graph = null;
        window.primaryActiveNodes = new Set();
        window.secondaryActiveNodes = new Set();
        let hoverNode = null;
        let isGraphThinking = false; // Stato di "ragionamento" preventivo

        const container = document.getElementById('graph-container');
        const toggleBtn = document.getElementById('mode-toggle');

        // Configurazione Colori
        const NODE_R = 4;
        const HIGHLIGHT_COLOR = '#00f5d4'; // Ciano neon
        const DEFAULT_COLOR = '#9d4edd'; // Viola di default

        // Carica dati del grafo
        fetch('/api/graph')
            .then(res => res.json())
            .then(data => {
                graphData = data;
                initGraph();
            })
            .catch(err => {
                console.error("Errore nel caricamento dei dati del grafo:", err);
            });

        // Risoluzione tipo di link in base all'attivazione dei nodi sorgente/destinazione
        function getLinkType(link) {
            if (!window.primaryActiveNodes || window.primaryActiveNodes.size === 0) return 'default';
            
            const srcId = typeof link.source === 'object' ? link.source.id : link.source;
            const tgtId = typeof link.target === 'object' ? link.target.id : link.target;
            
            const srcPrimary = window.primaryActiveNodes.has(srcId);
            const tgtPrimary = window.primaryActiveNodes.has(tgtId);
            const srcSecondary = window.secondaryActiveNodes.has(srcId);
            const tgtSecondary = window.secondaryActiveNodes.has(tgtId);
            
            if (srcPrimary && tgtPrimary) return 'strong'; // Link between primary active nodes
            if ((srcPrimary && tgtSecondary) || (tgtPrimary && srcSecondary)) return 'medium'; // Link between primary and secondary
            if (srcSecondary && tgtSecondary) return 'weak'; // Link between secondary neighbors
            return 'inactive'; // All other links
        }

        // Helper per impostare lo stato di auto-rotazione su OrbitControls
        function setAutoRotateState(speed) {
            if (Graph && typeof Graph.controls === 'function') {
                const controls = Graph.controls();
                if (controls) {
                    if (is3D) {
                        controls.autoRotate = true;
                        controls.autoRotateSpeed = speed;
                    } else {
                        controls.autoRotate = false;
                    }
                }
            }
        }

        function initGraph() {
            try {
                if (!Graph) {
                    if (typeof ForceGraph3D === 'undefined') {
                        console.warn("ForceGraph3D non è caricato. Il grafo non sarà visualizzato.");
                        showGraphError();
                        return;
                    }
                    Graph = ForceGraph3D()(container)
                        .width(container.clientWidth)
                        .height(container.clientHeight)
                        .graphData(graphData)
                        .nodeLabel('id')
                        .nodeColor(node => {
                            if (node === hoverNode) return '#fff';
                            if (window.primaryActiveNodes && window.primaryActiveNodes.has(node.id)) return HIGHLIGHT_COLOR;
                            if (window.secondaryActiveNodes && window.secondaryActiveNodes.has(node.id)) return '#c77dff'; // bright neon purple for secondary neighbors
                            return (window.primaryActiveNodes && window.primaryActiveNodes.size > 0) ? '#12151c' : DEFAULT_COLOR;
                        })
                        .nodeVal(node => {
                            const baseVal = node.val || 1;
                            if (window.primaryActiveNodes && window.primaryActiveNodes.size > 0) {
                                if (window.primaryActiveNodes.has(node.id)) return baseVal * 3.5;
                                if (window.secondaryActiveNodes.has(node.id)) return baseVal * 2.0;
                                return baseVal * 0.4;
                            }
                            return baseVal;
                        })
                        .nodeRelSize(NODE_R)
                        .linkColor(link => {
                            const type = getLinkType(link);
                            if (type === 'default') return 'rgba(157, 78, 221, 0.25)'; // Purple glow for default links
                            if (type === 'strong') return HIGHLIGHT_COLOR; // Ciano neon for strong connections
                            if (type === 'medium') return 'rgba(0, 245, 212, 0.45)'; // Semi-bright ciano
                            if (type === 'weak') return 'rgba(157, 78, 221, 0.35)'; // Purple-violet for neighbor-neighbor links
                            return 'rgba(255, 255, 255, 0.02)'; // very faint for inactive links
                        })
                        .linkWidth(link => {
                            const type = getLinkType(link);
                            if (type === 'default') return 1.2;
                            if (type === 'strong') return 4.0;
                            if (type === 'medium') return 2.2;
                            if (type === 'weak') return 1.2;
                            return 0.6;
                        })
                        // Neuroni in azione (particelle di energia)
                        .linkDirectionalParticles(link => {
                            const type = getLinkType(link);
                            if (type === 'default') return 0;
                            if (type === 'strong') return isGraphThinking ? 10 : 5;
                            if (type === 'medium') return isGraphThinking ? 6 : 3;
                            if (type === 'weak') return isGraphThinking ? 3 : 1;
                            return 0;
                        })
                        .linkDirectionalParticleSpeed(link => {
                            const type = getLinkType(link);
                            const baseSpeed = (type === 'strong') ? 0.035 : (type === 'medium' ? 0.02 : 0.01);
                            // Durante la fase "thinking" di ragionamento le cariche elettriche corrono più veloci
                            return isGraphThinking ? baseSpeed * 1.8 : baseSpeed;
                        })
                        .linkDirectionalParticleWidth(link => {
                            const type = getLinkType(link);
                            const baseWidth = (type === 'strong') ? 5.5 : (type === 'medium' ? 3.5 : 1.8);
                            return isGraphThinking ? baseWidth * 1.4 : baseWidth;
                        })
                        .linkDirectionalParticleColor(link => {
                            const type = getLinkType(link);
                            // Flusso ciano per i link principali, viola ad energia indotta per quelli adiacenti/deboli
                            if (type === 'strong') return HIGHLIGHT_COLOR;
                            if (type === 'medium') return '#00b4d8'; // Blue-ciano mix
                            return '#c77dff'; // Bright neon purple
                        })
                        .cooldownTicks(150)
                        .d3VelocityDecay(0.3)
                        .onNodeHover(node => {
                            hoverNode = node || null;
                            document.body.style.cursor = node ? 'pointer' : null;
                        });
                    
                    new ResizeObserver(() => {
                        if (Graph && typeof Graph.width === 'function') {
                            Graph.width(container.clientWidth).height(container.clientHeight);
                        }
                    }).observe(container);
                }
                
                // Imposta modalità 2D o 3D
                if (Graph && typeof Graph.numDimensions === 'function') {
                    Graph.numDimensions(is3D ? 3 : 2);
                }

                // Blocco rotazione fotocamera e asse Z in modalità 2D (OrbitControls)
                setTimeout(() => {
                    if (Graph && typeof Graph.controls === 'function') {
                        const controls = Graph.controls();
                        if (controls) {
                            controls.enableRotate = is3D;
                            if (!is3D) {
                                controls.autoRotate = false;
                                // Vincola la telecamera impedendo rotazioni su Z e pitch/yaw
                                controls.minPolarAngle = Math.PI / 2;
                                controls.maxPolarAngle = Math.PI / 2;
                                controls.minAzimuthAngle = 0;
                                controls.maxAzimuthAngle = 0;
                                // Riposiziona camera a piombo
                                Graph.cameraPosition({ x: 0, y: 0, z: 450 }, { x: 0, y: 0, z: 0 }, 500);
                            } else {
                                // Ripristina libertà di rotazione 3D e riattiva auto-rotazione lenta di idle
                                controls.minPolarAngle = 0;
                                controls.maxPolarAngle = Math.PI;
                                controls.minAzimuthAngle = -Infinity;
                                controls.maxAzimuthAngle = Infinity;
                                controls.autoRotate = true;
                                controls.autoRotateSpeed = isGraphThinking ? 5.0 : 0.4;
                            }
                        }
                    }
                }, 100);
            } catch (err) {
                console.error("Errore nell'inizializzazione del grafo WebGL:", err);
                showGraphError();
            }
        }

        function showGraphError() {
            if (!container) return;
            if (container.querySelector('.graph-error-msg')) return;
            
            const errDiv = document.createElement('div');
            errDiv.className = 'graph-error-msg';
            errDiv.style.position = 'absolute';
            errDiv.style.top = '50%';
            errDiv.style.left = '50%';
            errDiv.style.transform = 'translate(-50%, -50%)';
            errDiv.style.color = 'var(--text-secondary)';
            errDiv.style.textAlign = 'center';
            errDiv.style.padding = '20px';
            errDiv.style.zIndex = '5';
            errDiv.innerHTML = `
                <svg viewBox="0 0 24 24" style="width: 48px; height: 48px; fill: none; stroke: var(--accent-purple); stroke-width: 1.5; margin-bottom: 12px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <h3 style="margin-bottom: 8px;">Grafica WebGL non disponibile</h3>
                <p style="font-size:0.9rem; max-width: 300px; line-height: 1.4;">WebGL non supportato o errore nel caricamento delle librerie esterne. Il chatbot rimane completamente operativo.</p>
            `;
            container.appendChild(errDiv);
        }

        toggleBtn.addEventListener('click', () => {
            is3D = !is3D;
            toggleBtn.innerText = is3D ? "Switch to 2D" : "Switch to 3D";
            initGraph();
        });

        // Estrattore di nodi pertinenti in base al testo immesso
        function findRelevantNodes(text) {
            if (!text || !graphData.nodes || graphData.nodes.length === 0) return [];
            const cleanText = text.toLowerCase();
            // Trova parole chiave significative (minimo 3 caratteri)
            const words = cleanText.split(/[\s,.'"?!\(\)\[\]_#\-]+/g).filter(w => w.length >= 3);
            
            const matched = [];
            graphData.nodes.forEach(node => {
                const nodeLower = node.id.toLowerCase();
                // Match se il nodo contiene una parola chiave o viceversa
                const isMatch = words.some(w => nodeLower.includes(w) || w.includes(nodeLower));
                if (isMatch) {
                    matched.push(node.id);
                }
            });
            return matched;
        }

        function highlightNodes(nodeIds, isThinking = false) {
            if (!Graph || typeof Graph.nodeColor !== 'function') return;
            try {
                isGraphThinking = isThinking;
                window.primaryActiveNodes.clear();
                window.secondaryActiveNodes.clear();
                
                // Mappa i nodi citati in modo tollerante
                nodeIds.forEach(id => {
                    const cleanId = id.split('/').pop().replace('.md', '').trim().toLowerCase();
                    const matchedNode = graphData.nodes.find(n => n.id.toLowerCase() === cleanId);
                    if (matchedNode) {
                        window.primaryActiveNodes.add(matchedNode.id);
                    }
                });
                
                // Se ragioniamo (isThinking) e non abbiamo trovato nodi specifici, usiamo i top 6 hub come fallback per mostrare l'attività elettrica generale del network.
                if (window.primaryActiveNodes.size === 0 && isThinking) {
                    const sortedNodes = [...graphData.nodes]
                        .sort((a, b) => (b.val || 1) - (a.val || 1))
                        .slice(0, 6);
                    sortedNodes.forEach(n => window.primaryActiveNodes.add(n.id));
                }
                
                // Trova i vicini di 1° grado
                if (window.primaryActiveNodes.size > 0) {
                    graphData.links.forEach(link => {
                        const srcId = typeof link.source === 'object' ? link.source.id : link.source;
                        const tgtId = typeof link.target === 'object' ? link.target.id : link.target;
                        
                        if (window.primaryActiveNodes.has(srcId)) {
                            if (!window.primaryActiveNodes.has(tgtId)) {
                                window.secondaryActiveNodes.add(tgtId);
                            }
                        }
                        if (window.primaryActiveNodes.has(tgtId)) {
                            if (!window.primaryActiveNodes.has(srcId)) {
                                window.secondaryActiveNodes.add(srcId);
                            }
                        }
                    });
                }
                
                // Forza il ricalcolo degli attributi grafici
                Graph.nodeColor(Graph.nodeColor());
                Graph.nodeVal(Graph.nodeVal());
                Graph.linkColor(Graph.linkColor());
                Graph.linkWidth(Graph.linkWidth());
                if (typeof Graph.linkDirectionalParticles === 'function') {
                    Graph.linkDirectionalParticles(Graph.linkDirectionalParticles());
                    Graph.linkDirectionalParticleSpeed(Graph.linkDirectionalParticleSpeed());
                    Graph.linkDirectionalParticleWidth(Graph.linkDirectionalParticleWidth());
                }
 
                // Zoom e posizionamento dinamico baricentrico su TUTTI i nodi attivi (primari + secondari)
                const activeNodes = graphData.nodes.filter(n => window.primaryActiveNodes.has(n.id) || window.secondaryActiveNodes.has(n.id));
                if (activeNodes.length > 0 && typeof Graph.cameraPosition === 'function') {
                    let sumX = 0, sumY = 0, sumZ = 0;
                    activeNodes.forEach(n => {
                        sumX += n.x || 0;
                        sumY += n.y || 0;
                        sumZ += n.z || 0;
                    });
                    const avgX = sumX / activeNodes.length;
                    const avgY = sumY / activeNodes.length;
                    const avgZ = sumZ / activeNodes.length;
                    
                    // Trova la massima estensione dal baricentro
                    let maxDist = 0;
                    activeNodes.forEach(n => {
                        const d = Math.hypot((n.x || 0) - avgX, (n.y || 0) - avgY, (n.z || 0) - avgZ);
                        if (d > maxDist) maxDist = d;
                    });
                    
                    // Calcola distanza ottimale (zoom più ravvicinato)
                    const distance = Math.max(maxDist * 1.8, is3D ? 80 : 120);
                    
                    // In 2D manteniamo l'asse Z a piombo
                    const camX = is3D ? avgX + distance * 0.6 : avgX;
                    const camY = is3D ? avgY + distance * 0.6 : avgY;
                    const camZ = is3D ? avgZ + distance * 0.6 : distance;
                    
                    Graph.cameraPosition(
                        { x: camX, y: camY, z: camZ }, // posizione fotocamera
                        { x: avgX, y: avgY, z: avgZ }, // target di lookAt (baricentro)
                        1800 // durata della transizione fluida
                    );
                }
            } catch (err) {
                console.warn("Errore nell'aggiornamento visivo del grafo:", err);
            }
        }

        // Logica Chat
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const chatSubmit = document.getElementById('chat-submit');
        let chatHistory = [];

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // Add User message
            appendMessage('user', message);
            chatInput.value = '';
            chatSubmit.disabled = true;

            // Add Loading Bot message
            const loadingId = 'loading-' + Date.now();
            appendMessage('bot', '<span class="loading-dots">Sto pensando</span>', loadingId);

            // Rimodulazione e pre-evidenziazione immediata delle parole chiave
            const relevantNodes = findRelevantNodes(message);
            highlightNodes(relevantNodes, true);

            // Attiva auto-rotazione nativa e fluida su OrbitControls per la fase "thinking"
            if (Graph && typeof Graph.controls === 'function') {
                try {
                    const controls = Graph.controls();
                    if (controls) {
                        if (is3D) {
                            controls.autoRotate = true;
                            controls.autoRotateSpeed = 8.0; // Rotazione hardware-accelerata a 60 FPS

                            // Imposta il target di rotazione sul baricentro dei nodi di interesse (primari + secondari)
                            let targetX = 0, targetY = 0, targetZ = 0;
                            const activeNodes = graphData.nodes.filter(n => window.primaryActiveNodes.has(n.id) || window.secondaryActiveNodes.has(n.id));
                            if (activeNodes.length > 0) {
                                let sumX = 0, sumY = 0, sumZ = 0;
                                activeNodes.forEach(n => {
                                    sumX += n.x || 0;
                                    sumY += n.y || 0;
                                    sumZ += n.z || 0;
                                });
                                targetX = sumX / activeNodes.length;
                                targetY = sumY / activeNodes.length;
                                targetZ = sumZ / activeNodes.length;
                                controls.target.set(targetX, targetY, targetZ);
                            }
                        }
                        // Riscalda leggermente la simulazione fisica una sola volta per assestare l'espansione dei nodi attivi
                        if (typeof Graph.d3ReheatSimulation === 'function') {
                            Graph.d3ReheatSimulation();
                        }
                    }
                } catch (camErr) {
                    console.warn("Impossibile far orbitare la camera nativamente:", camErr);
                }
            }

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, history: chatHistory })
                });

                // Dopo aver inviato, aggiungiamo il messaggio utente alla history
                chatHistory.push({ role: 'user', content: message });

                const data = await res.json();
                
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();

                if (res.ok) {
                    chatHistory.push({ role: 'model', content: data.answer });
                    
                    // Mantieni max 14 messaggi (7 turni)
                    if (chatHistory.length > 14) {
                        chatHistory = chatHistory.slice(chatHistory.length - 14);
                    }

                    // Parser sicuro di markdown + wikilink
                    let parsedContent = data.answer;
                    if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
                        parsedContent = marked.parse(data.answer);
                    } else {
                        parsedContent = fallbackMarkdown(data.answer);
                    }
                    parsedContent = parseWikilinks(parsedContent);
                    appendMessage('bot', parsedContent);
                    
                    // Disattiva stato thinking e applica evidenziazione e zoom finale sui nodi citati
                    setAutoRotateState(0.4); // Ripristina rotazione lenta di idle
                    if (data.cited_nodes && data.cited_nodes.length > 0) {
                        highlightNodes(data.cited_nodes, false);
                    } else {
                        // Mantieni l'evidenziazione di input se l'AI non cita nodi specifici, spegnendo l'attività elettrica di thinking
                        highlightNodes(relevantNodes, false);
                    }
                } else {
                    appendMessage('bot', `Errore: ${data.error}`);
                    chatHistory.pop(); // Rimuovi il messaggio utente se la chiamata fallisce
                }

            } catch (err) {
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();
                appendMessage('bot', "Errore di connessione al server.");
                if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === 'user') {
                    chatHistory.pop();
                }
            } finally {
                // Ripristina sempre la rotazione lenta di idle al termine (anche in caso di errore)
                setAutoRotateState(0.4);
                chatSubmit.disabled = false;
                chatInput.focus();
            }
        });

        function appendMessage(sender, content, id = null) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (id) div.id = id;
            div.innerHTML = content;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- Fallback Markdown Parser (per grassetti ed elementi base se marked CDN fallisce) ---
        function fallbackMarkdown(text) {
            let html = text;
            // Format bold: **text** -> <strong>text</strong>
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            // Format italic: *text* -> <em>text</em>
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            // Format code inline: `code` -> <code>code</code>
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Format line breaks: \n -> <br>
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        // --- Parser per convertire i [[Wikilink]] in link HTML interattivi ---
        function parseWikilinks(text) {
            // Riconosce [[Percorso/File|Etichetta]] o [[Percorso/File]]
            return text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (match, path, label) => {
                const cleanPath = path.trim();
                const displayLabel = label ? label.trim() : cleanPath.split('/').pop();
                return `<a href="#" class="wiki-link" data-path="${cleanPath}">${displayLabel}</a>`;
            });
        }

        // --- Elementi e Controllo del Modale di Approfondimento ---
        const modal = document.getElementById('wiki-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const modalClose = document.getElementById('modal-close');

        function showModalLoading(path) {
            modalTitle.innerText = "Caricamento...";
            modalBody.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100%; min-height: 250px; flex-direction:column; gap:15px; color: var(--text-secondary);">
                    <div style="width: 40px; height: 40px; border: 3px solid rgba(0,245,212,0.1); border-radius: 50%; border-top-color: var(--accent-cyan); animation: spin 1s linear infinite;"></div>
                    <p>Sto leggendo la scheda <strong>${path}</strong>...</p>
                </div>
                <style>
                    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
                </style>
            `;
            modal.style.display = 'flex';
        }

        function showModal(title, htmlContent) {
            modalTitle.innerText = title;
            modalBody.innerHTML = htmlContent;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Chiude col tasto ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Event delegation per i click sui link delle schede wiki
        document.addEventListener('click', async (e) => {
            const link = e.target.closest('.wiki-link');
            if (!link) return;
            
            e.preventDefault();
            const path = link.getAttribute('data-path');
            if (!path) return;
            
            showModalLoading(path);
            
            try {
                const res = await fetch(`/api/wiki?path=${encodeURIComponent(path)}`);
                if (!res.ok) {
                    throw new Error(`Impossibile caricare il file "${path}" nel vault.`);
                }
                const data = await res.json();
                
                // Formatta il frontmatter se presente
                let metaHtml = "";
                if (data.frontmatter && Object.keys(data.frontmatter).length > 0) {
                    metaHtml += `<div class="wiki-metadata" style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; border-left: 3px solid var(--accent-purple); border-right: 1px solid rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);">`;
                    for (const [key, val] of Object.entries(data.frontmatter)) {
                        if (val !== null && val !== undefined) {
                            if (typeof val === 'object') {
                                metaHtml += `<strong>${key}</strong>: ${JSON.stringify(val)}<br>`;
                            } else {
                                metaHtml += `<strong>${key}</strong>: ${val}<br>`;
                            }
                        }
                    }
                    metaHtml += `</div>`;
                }
                
                // Conversione corpo markdown
                let contentHtml = data.content;
                if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
                    contentHtml = marked.parse(data.content);
                } else {
                    contentHtml = fallbackMarkdown(data.content);
                }
                
                // Converte ricorsivamente i wikilink anche all'interno del modale
                contentHtml = parseWikilinks(contentHtml);
                
                showModal(data.title, metaHtml + contentHtml);
            } catch (err) {
                console.error(err);
                showModal("Errore", `
                    <div style="color: #ff6b6b; padding: 30px; text-align: center;">
                        <svg viewBox="0 0 24 24" style="width: 48px; height: 48px; fill: none; stroke: currentColor; stroke-width: 1.5; margin-bottom: 15px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <h3 style="margin-bottom: 10px;">Impossibile trovare la scheda</h3>
                        <p style="font-size: 0.95rem; opacity: 0.8;">La nota <strong>[[${path}]]</strong> non esiste ancora nel vault o il percorso non è valido.</p>
                    </div>
                `);
            }
        });
    </script>
</body>
</html>
